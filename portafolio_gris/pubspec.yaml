name: portafolio_gris
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.11.5


dependencies:
  flutter:
    sdk: flutter
  flutter_custom_clippers: ^2.0.0
  cupertino_icons: ^1.0.8


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
  assets:
    - assets/gris.png
    - assets/gris_manos.png
    - assets/gris_cam.png
    - assets/gris_sonriendo.png
    - assets/logo_unimar.png
    - assets/nube_title.png


  fonts:
    - family: Regular
      fonts:
        - asset: fonts/YanoneKaffeesatz-Regular.ttf
        - asset: fonts/YanoneKaffeesatz-Bold.ttf
        
    - family: Titulos
      fonts:
        - asset: fonts/Avallon.ttf